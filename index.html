// ============ LEADERBOARD (LOCAL + ONLINE) ============
function loadLB(){try{return JSON.parse(localStorage.getItem('icy_lb')||'[]');}catch{return[];}}
function saveLB(lb){localStorage.setItem('icy_lb',JSON.stringify(lb));}
function addToLB(name,sc,fl){const lb=loadLB();lb.push({name,score:sc,floor:fl,date:Date.now()});lb.sort((a,b)=>b.score-a.score);if(lb.length>10)lb.length=10;saveLB(lb);return lb;}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

let db=null,fbReady=false;
try{
    if(FIREBASE_CONFIG){
        firebase.initializeApp(FIREBASE_CONFIG);
        db=firebase.firestore();
        fbReady=true;
        console.log('Firebase connected! Online leaderboard active.');
    }
}catch(e){console.warn('Firebase init failed:',e);}

// Render leaderboard - tries Firebase first, falls back to local
async function renderLB(containerId,highlightScore){
    const el=document.getElementById(containerId);
    const titleEl=el.parentElement.querySelector('.lb-title');
    let lb=loadLB(),online=false;
    if(fbReady){
        try{
            const snap=await db.collection('scores').orderBy('score','desc').limit(10).get();
            lb=snap.docs.map(d=>d.data());online=true;
        }catch(e){lb=loadLB();}
    }
    titleEl.innerHTML=online?'<span class="lb-online-badge">ONLINE</span> טבלת שיאים':'<span class="lb-offline-badge">מקומי</span> טבלת שיאים';
    if(!lb.length){el.innerHTML='<div class="lb-empty">אין שיאים עדיין</div>';return;}
    let html='<table class="lb-table">';
    lb.forEach((e,i)=>{
        let cls='';if(i===0)cls='lb-gold';else if(i===1)cls='lb-silver';else if(i===2)cls='lb-bronze';
        if(highlightScore&&e.score===highlightScore)cls='lb-you';
        html+=`<tr class="${cls}"><td class="rank">${i+1}.</td><td class="lb-name">${esc(e.name)}</td><td class="lb-score">${e.score.toLocaleString()}</td><td class="lb-floor">F${e.floor}</td></tr>`;
    });
    el.innerHTML=html+'</table>';
}

// Check if score qualifies (online or local)
async function qualifiesAsync(sc){
    if(fbReady){
        try{
            const snap=await db.collection('scores').orderBy('score','desc').limit(10).get();
            const scores=snap.docs.map(d=>d.data().score);
            return scores.length<10||sc>scores[scores.length-1];
        }catch(e){}
    }

function addPlat(fl){

    if(fl>0&&fl%THEME_FLOORS===0){plats.push({x:PLAY_L,y,w:PLAY_W,fl,safe:true});return;}
    const w=Math.max(72,155-fl*.3),x=PLAY_L+Math.random()*(PLAY_W-w);
    plats.push({x,y,w,fl});
}

function platColors(fl){
    const th=THEMES[getThemeIdx(fl)];
    const z=Math.floor((fl%THEME_FLOORS)/Math.ceil(THEME_FLOORS/th.pals.length))%th.pals.length;
    return th.pals[z];
}

// ============ UPDATE ============
function update(){
    if(!running)return;
    frame++;
    let dir=0;
    if(keys['ArrowLeft']||keys['KeyA'])dir=-1;
    if(keys['ArrowRight']||keys['KeyD'])dir=1;
    const acc=pl.on?MOVE_ACC:AIR_ACC,fri=pl.on?FRIC:AIR_FRIC;
    if(dir){pl.vx+=dir*acc;pl.face=dir;}
    pl.vx*=fri;pl.vx=Math.max(-MAX_SPD,Math.min(MAX_SPD,pl.vx));

    // Jump
    if((keys['Space']||keys['ArrowUp']||keys['KeyW'])&&pl.on){
        const sp=Math.abs(pl.vx);let f,pw;const ch=CHARS[selectedChar];
        if(sp>6.5){f=UJUMP;pw=2;spawnBurst(pl.x+PW/2,pl.y+PH,ch.glow,28,9);spawnRing(pl.x+PW/2,pl.y+PH,ch.glow);shake.i=7;}
        else if(sp>4.5){f=MJUMP;pw=1.6;spawnBurst(pl.x+PW/2,pl.y+PH,'#42a5f5',20,7);spawnRing(pl.x+PW/2,pl.y+PH,'#42a5f5');shake.i=4;}
        else if(sp>2.5){f=SJUMP;pw=1.3;spawnBurst(pl.x+PW/2,pl.y+PH,'#81d4fa',12,5);}
        else{f=JUMP;pw=1;spawnBurst(pl.x+PW/2,pl.y+PH,'#99b',5,3);}
        pl.vy=f;pl.on=false;pl.sq=1.3;pl.st=0.7;playJump(pw);
        if(pl.consecutiveMulti>=3){const nf=Math.min(Math.floor(pl.consecutiveMulti/3),3);pl.flipping=true;pl.flipAngle=0;pl.flipTotal=nf*Math.PI*2;pl.flipSpeed=pl.flipTotal/38;pl.totalFlips+=nf;playFlip(nf);spawnFlipStart(pl.x+PW/2,pl.y+PH/2,nf);const fl=['FLIP!','DOUBLE FLIP!!','TRIPLE FLIP!!!'],fc=['#ffdd57','#ff8a65','#ff4081'],idx=Math.min(nf-1,2);spawnFText(pl.x+PW/2,pl.y-30,fl[idx],fc[idx],1.6+idx*.3);flipDisp.textContent=fl[idx];flipDisp.style.color=fc[idx];flipDisp.classList.add('show');setTimeout(()=>flipDisp.classList.remove('show'),1500);}
    }

    pl.vy+=GRAVITY;pl.y+=pl.vy;pl.x+=pl.vx;

    // Flip
    if(pl.flipping){pl.flipAngle+=pl.flipSpeed;if(frame%3===0)afterimages.push({x:pl.x,y:pl.y,angle:pl.flipAngle,life:16,maxLife:16});
    if(frame%2===0){const cx=pl.x+PW/2,cy=pl.y+PH/2,a=pl.flipAngle*2,r=18+Math.sin(pl.flipAngle*3)*6,ch=CHARS[selectedChar];particles.push({x:cx+Math.cos(a)*r,y:cy+Math.sin(a)*r,vx:Math.cos(a)*2,vy:Math.sin(a)*2,l:20,ml:20,c:ch.flipTrail,s:2+Math.random()*2,t:'s'});particles.push({x:cx+Math.cos(a+Math.PI)*r,y:cy+Math.sin(a+Math.PI)*r,vx:Math.cos(a+Math.PI)*2,vy:Math.sin(a+Math.PI)*2,l:18,ml:18,c:ch.glow,s:1.5+Math.random()*2,t:'c'});}
    if(pl.flipAngle>=pl.flipTotal){pl.flipping=false;pl.flipAngle=0;const ch=CHARS[selectedChar],nf=Math.round(pl.flipTotal/(Math.PI*2));spawnFlipComplete(pl.x+PW/2,pl.y+PH/2,ch.flipTrail,nf);score+=nf*combo*25;spawnFText(pl.x+PW/2,pl.y-55,`+${nf*combo*25} FLIP`,ch.flipTrail,1.1);shake.i=Math.min(nf*4,12);}}

    // Combo energy trail
    if(combo>=5&&frame%2===0){const ch=CHARS[selectedChar],cs=[ch.glow,ch.flipTrail,'#ffdd57','#fff'];particles.push({x:pl.x+PW/2+(Math.random()-.5)*10,y:pl.y+PH+Math.random()*5,vx:(Math.random()-.5)*1.5,vy:1+Math.random()*2,l:15+Math.random()*10,ml:25,c:cs[Math.floor(Math.random()*cs.length)],s:2+Math.random()*3,t:'c'});}

    // Wall bounce
    if(pl.x<PLAY_L){pl.x=PLAY_L;if(Math.abs(pl.vx)>1.5){pl.vx=-pl.vx*WALL_BOUNCE;pl.vx=Math.min(pl.vx,MAX_SPD);playWallHit();shake.i=Math.max(shake.i,Math.abs(pl.vx)*.6);spawnWallSparks(PLAY_L,pl.y+PH/2,1);pl.st=.75;}else pl.vx=0;}
    if(pl.x+PW>PLAY_R){pl.x=PLAY_R-PW;if(Math.abs(pl.vx)>1.5){pl.vx=-pl.vx*WALL_BOUNCE;pl.vx=Math.max(pl.vx,-MAX_SPD);playWallHit();shake.i=Math.max(shake.i,Math.abs(pl.vx)*.6);spawnWallSparks(PLAY_R,pl.y+PH/2,-1);pl.st=.75;}else pl.vx=0;}

    // Trails
    if(Math.abs(pl.vx)>3.5||Math.abs(pl.vy)>6){const ch=CHARS[selectedChar];trails.push({x:pl.x+PW/2,y:pl.y+PH/2,s:3+Math.abs(pl.vx)*.7,l:14,ml:14,c:Math.abs(pl.vx)>5?ch.glow:'#557'});}

    // Platform collision
    pl.on=false;
    if(pl.vy>=0){for(const p of plats){const sy=p.y-cam.y;if(sy>CH+60||sy<-80)continue;
    if(pl.x+PW-4>p.x&&pl.x+4<p.x+p.w){const prev=(pl.y+PH)-pl.vy;
    if(prev<=p.y+4&&pl.y+PH>=p.y){pl.y=p.y-PH;pl.vy=0;pl.on=true;pl.sq=.7;pl.st=1.25;
    if(p.fl>lastLand){const jumped=p.fl-Math.max(lastLand,0);handleLand(p,jumped);lastLand=p.fl;hFloor=p.fl;
    const top=plats[plats.length-1].fl;if(p.fl>top-70)for(let f=top+1;f<=top+70;f++)addPlat(f);
    // Theme transition check
    const newTheme=getThemeIdx(hFloor);
    if(newTheme!==currentThemeIdx){currentThemeIdx=newTheme;showThemeAnnounce(THEMES[newTheme]);levelDisp.textContent=THEMES[newTheme].he;}}
    if(pl.flipping){pl.flipping=false;pl.flipAngle=0;}
    playLand();spawnDust(pl.x+PW/2,p.y);break;}}}}

    pl.sq+=(1-pl.sq)*.14;pl.st+=(1-pl.st)*.14;
    if(Math.abs(pl.vx)>.6&&pl.on){pl.ft++;if(pl.ft>Math.max(3,8-Math.abs(pl.vx))){pl.fr=(pl.fr+1)%4;pl.ft=0;}}
    else if(!pl.on){pl.fr=pl.vy<-2?1:(pl.vy>3?3:2);}else{pl.fr=0;pl.ft=0;}
    if(cTimer>0){cTimer--;if(cTimer<=0){combo=0;comboDisp.classList.remove('show');}}

    // Camera follow
    const ty=pl.y-CH*.4;if(ty<cam.ty)cam.ty=ty;

    // *** RISING FLOOR ***
    if(frame>360){// 6 second grace
        risingSpeed+=0.00004;
        risingMinY-=risingSpeed;
        if(cam.ty>risingMinY)cam.ty=risingMinY;
    }

    cam.y+=(cam.ty-cam.y)*.065;

    if(shake.i>0){shake.x=(Math.random()-.5)*shake.i*2;shake.y=(Math.random()-.5)*shake.i*2;shake.i*=.84;if(shake.i<.3)shake.i=0;}else{shake.x=0;shake.y=0;}
    dScore+=(score-dScore)*.1;scoreVal.textContent=Math.floor(dScore).toLocaleString();floorVal.textContent=`Floor ${hFloor}`;
    if(pl.y-cam.y>CH+80)gameOver();
    updPart();updTrails();updFTexts();updSnow();updAfterimages();updCrystals();
    plats=plats.filter(p=>p.y-cam.y<CH+350);
}

function showThemeAnnounce(th){
    playThemeChange();
    const el=themeAnn,lv=Math.floor(hFloor/THEME_FLOORS)+1;
    el.querySelector('.ta-level').textContent=`LEVEL ${lv}`;
    el.querySelector('.ta-name').textContent=th.name;
    el.querySelector('.ta-name').style.color=th.glow;
    el.classList.add('show');
    setTimeout(()=>el.classList.remove('show'),2500);
    shake.i=10;
    spawnFireworks(pl.x+PW/2,pl.y-40,th.glow,45);
}

function handleLand(p,jumped){
    if(jumped>1){combo+=jumped;cTimer=160;maxCombo=Math.max(maxCombo,combo);const pts=jumped*Math.min(combo,50)*10;score+=pts;const lv=Math.min(Math.floor(combo/5),4);playCombo(lv);pl.consecutiveMulti++;
    const labels=['NICE!','GREAT!','SUPER!','AMAZING!','INCREDIBLE!','LEGENDARY!!'],colors=['#42a5f5','#66bb6a','#ffdd57','#ff8a65','#ef5350','#ce93d8'],idx=Math.min(Math.floor(jumped/2),labels.length-1);
    spawnFText(pl.x+PW/2,pl.y-25,`${labels[idx]} x${combo}`,colors[idx],1.2+idx*.25);spawnFText(pl.x+PW/2,pl.y-52,`+${pts}`,'#fff',.85);
    comboDisp.innerHTML=`COMBO x${combo}<br><span style="font-size:0.65em">${labels[idx]}</span>`;comboDisp.classList.add('show');
    if(jumped>=4){spawnFireworks(pl.x+PW/2,pl.y,colors[idx],35+jumped*6);shake.i=Math.min(jumped*2.5,14);}}
    else{score+=10;pl.consecutiveMulti=0;combo=0;comboDisp.classList.remove('show');}
}

// ============ PARTICLES ============
function spawnBurst(x,y,c,n,sp){for(let i=0;i<n;i++){const a=(i/n)*Math.PI*2+Math.random()*.5,s=(.5+Math.random())*sp;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,l:30+Math.random()*20,ml:50,c,s:2+Math.random()*3,t:'c'});}}
function spawnRing(x,y,c){particles.push({x,y,vx:0,vy:0,l:25,ml:25,c,s:5,t:'r'});}
function spawnDust(x,y){for(let i=0;i<10;i++)particles.push({x:x+(Math.random()-.5)*24,y:y-2,vx:(Math.random()-.5)*4.5,vy:-Math.random()*3,l:22+Math.random()*15,ml:37,c:'rgba(200,230,255,0.5)',s:3+Math.random()*4.5,t:'d'});}
function spawnFireworks(x,y,c,n){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=2+Math.random()*9;particles.push({x:x+(Math.random()-.5)*30,y:y+(Math.random()-.5)*30,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,l:35+Math.random()*25,ml:60,c,s:1.5+Math.random()*3,t:'s'});}}
function spawnWallSparks(wx,wy,d){for(let i=0;i<14;i++)particles.push({x:wx,y:wy+(Math.random()-.5)*35,vx:d*(2.5+Math.random()*5),vy:(Math.random()-.5)*7,l:16+Math.random()*16,ml:32,c:['#ffdd57','#fff','#90caf9'][i%3],s:1.5+Math.random()*2.5,t:'s'});for(let i=0;i<6;i++)particles.push({x:wx+d*5,y:wy+(Math.random()-.5)*25,vx:d*(1+Math.random()*2.5),vy:(Math.random()-.5)*2,l:20+Math.random()*12,ml:32,c:'rgba(180,210,240,0.35)',s:4+Math.random()*5,t:'d'});}
function spawnFlipStart(x,y,nf){const ch=CHARS[selectedChar],n=16+nf*10;for(let i=0;i<n;i++){const a=(i/n)*Math.PI*2*3,sp=3+(i/n)*6;particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1.5,l:25+Math.random()*15,ml:40,c:ch.flipTrail,s:1.5+Math.random()*2,t:'s'});}for(let i=0;i<nf;i++)setTimeout(()=>spawnRing(x,y,ch.glow),i*60);}
function spawnFlipComplete(x,y,color,nf){const n=25+nf*12;for(let i=0;i<n;i++){const a=(i/n)*Math.PI*2,sp=4+Math.random()*7,cs=[color,'#ffdd57','#fff',CHARS[selectedChar].glow];particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,l:30+Math.random()*25,ml:55,c:cs[i%cs.length],s:2+Math.random()*3,t:'s'});}spawnRing(x,y,color);spawnRing(x,y,'#fff');}
function spawnFText(x,y,text,c,sc){fTexts.push({x,y,text,c,l:75,ml:75,sc:sc||1});}
function updPart(){particles=particles.filter(p=>p.l>0);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.t==='c'||p.t==='d')p.vy+=.08;if(p.t==='s'){p.vy+=.12;p.vx*=.97;}if(p.t==='r')p.s+=3.5;p.l--;});}
function updTrails(){trails=trails.filter(t=>t.l>0);trails.forEach(t=>t.l--);}
function updFTexts(){fTexts=fTexts.filter(t=>t.l>0);fTexts.forEach(t=>{t.y-=1.3;t.l--;});}
function updAfterimages(){afterimages=afterimages.filter(a=>a.life>0);afterimages.forEach(a=>a.life--);}
function updSnow(){const th=getTheme(),d=th.snowDir;snow.forEach(s=>{if(d===-1){s.y-=s.sp*.6;if(s.y<-5){s.y=CH+5;s.x=Math.random()*CW;}}else{s.y+=s.sp;if(s.y>CH+5){s.y=-5;s.x=Math.random()*CW;}}s.x+=s.dr+Math.sin(frame*.018+s.ph)*.3;if(s.tp===1&&s.rot!==undefined)s.rot+=s.rs;if(s.x>CW+5)s.x=-5;if(s.x<-5)s.x=CW+5;});}
function updCrystals(){crystals.forEach(c=>{c.y+=c.dy;c.x+=c.dx+Math.sin(frame*.012+c.ph)*.15;c.rot+=c.rs;if(c.y<-10){c.y=CH+10;c.x=Math.random()*CW;}if(c.y>CH+10){c.y=-10;c.x=Math.random()*CW;}if(c.x>CW+10)c.x=-10;if(c.x<-10)c.x=CW+10;});}

// ============ DRAW ============
function draw(){
    const th=getTheme(),hr=Math.min(Math.abs(cam.y)/10000,1);
    // Sky
    const bg=ctx.createLinearGradient(0,0,0,CH);
    bg.addColorStop(0,lerpC(th.sky[0],[2,24,82],hr));bg.addColorStop(0.5,lerpC(th.sky[1],[12,22,60],hr));bg.addColorStop(1,lerpC(th.sky[2],[6,20,48],hr));
    ctx.fillStyle=bg;ctx.fillRect(0,0,CW,CH);

    // Stars
    stars.forEach(s=>{s.tw+=s.sp;const a=.25+Math.sin(s.tw)*.25;if(s.sparkle){ctx.globalAlpha=Math.max(0,a)*.7;ctx.strokeStyle='rgba(220,240,255,0.9)';ctx.lineWidth=.8;const sz=s.r*2.5;ctx.beginPath();ctx.moveTo(s.x-sz,s.y);ctx.lineTo(s.x+sz,s.y);ctx.stroke();ctx.beginPath();ctx.moveTo(s.x,s.y-sz);ctx.lineTo(s.x,s.y+sz);ctx.stroke();ctx.globalAlpha=Math.max(0,a)*.15;ctx.fillStyle='#c0e0ff';ctx.beginPath();ctx.arc(s.x,s.y,sz*1.5,0,Math.PI*2);ctx.fill();}else{ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(200,220,255,${Math.max(0,a)})`;ctx.fill();}});ctx.globalAlpha=1;

    // Aurora
    if(hr>.15){ctx.globalAlpha=(hr-.15)*.12;const ag=ctx.createLinearGradient(0,0,CW,CH*.35);ag.addColorStop(0,'rgba(0,255,150,1)');ag.addColorStop(.4,'rgba(60,100,255,0.7)');ag.addColorStop(.7,'rgba(180,40,255,0.4)');ag.addColorStop(1,'rgba(255,100,200,0.2)');ctx.fillStyle=ag;ctx.fillRect(0,0,CW,CH*.35);ctx.globalAlpha=1;}

    // Mountains
    const mA=Math.max(0,1-Math.abs(cam.y)/12000);
    if(mA>.01){const pO=cam.y*.03;ctx.globalAlpha=mA*.5;drawMR(farMountains,CH*.6,pO*.5,'rgb(12,18,45)','rgb(18,25,55)');ctx.globalAlpha=mA*.6;drawMR(nearMountains,CH*.75,pO,'rgb(8,14,35)','rgb(14,20,42)');ctx.globalAlpha=1;}

    // Clouds
    clouds.forEach(c=>{c.x+=c.sp;if(c.x>CW+c.w*2)c.x=-c.w*2;const cy=c.y+cam.y*.015;ctx.globalAlpha=c.op;ctx.fillStyle='#c8ddf0';const r=c.w*.18;ctx.beginPath();ctx.arc(c.x,cy,r,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(c.x+r*.9,cy-r*.35,r*1.3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(c.x+r*2.1,cy-r*.1,r*1.05,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(c.x+r*3,cy+r*.1,r*.8,0,Math.PI*2);ctx.fill();});ctx.globalAlpha=1;

    // Light beams
    for(let i=0;i<3;i++){const bx=CW*.15+i*CW*.35,ba=.1+Math.sin(frame*.002+i*2.1)*.04;ctx.save();ctx.translate(bx,0);ctx.rotate(.08+Math.sin(frame*.0015+i)*.03);const lg=ctx.createLinearGradient(0,0,0,CH);lg.addColorStop(0,`rgba(180,220,255,${ba})`);lg.addColorStop(.4,`rgba(180,220,255,${ba*.3})`);lg.addColorStop(1,'rgba(180,220,255,0)');ctx.fillStyle=lg;ctx.fillRect(-25,0,50,CH);ctx.restore();}

    // Snow with theme color
    const sc=th.snow;
    snow.forEach(s=>{if(s.tp===1){drawSF(s.x,s.y,s.r,s.rot,s.op,sc);}else{ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(${sc[0]},${sc[1]},${sc[2]},${s.op})`;ctx.fill();if(s.r>1.8&&s.tp===0){ctx.globalAlpha=s.op*.15;ctx.fillStyle=`rgba(${sc[0]},${sc[1]},${sc[2]},1)`;ctx.beginPath();ctx.arc(s.x,s.y,s.r*3,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}}});

    // Ice crystals
    crystals.forEach(c=>{const tw=Math.sin(frame*.04+c.ph)*.3+.7;ctx.globalAlpha=c.op*tw;ctx.save();ctx.translate(c.x,c.y);ctx.rotate(c.rot);ctx.strokeStyle=`rgba(${sc[0]},${sc[1]},${sc[2]},0.6)`;ctx.lineWidth=.6;ctx.fillStyle=`rgba(${sc[0]},${sc[1]},${sc[2]},0.12)`;ctx.beginPath();for(let i=0;i<6;i++){const a=i*Math.PI/3;ctx.lineTo(Math.cos(a)*c.sz,Math.sin(a)*c.sz);}ctx.closePath();ctx.fill();ctx.stroke();ctx.restore();});ctx.globalAlpha=1;

    // Walls
    drawWalls();

    ctx.save();ctx.translate(shake.x,shake.y-cam.y);

    // Platform glow
    for(const p of plats){const sy=p.y-cam.y;if(sy>CH+40||sy<-60)continue;const pal=platColors(p.fl);ctx.globalAlpha=.06;const pg=ctx.createRadialGradient(p.x+p.w/2,p.y+PLAT_H/2,3,p.x+p.w/2,p.y+PLAT_H/2,p.w*.55);pg.addColorStop(0,`rgb(${pal.a[0]},${pal.a[1]},${pal.a[2]})`);pg.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=pg;ctx.fillRect(p.x-p.w*.3,p.y-12,p.w*1.6,PLAT_H+30);}ctx.globalAlpha=1;

    // Platforms
    for(const p of plats){const sy=p.y-cam.y;if(sy>CH+40||sy<-60)continue;if(p.safe)drawSafePlat(p);else drawPlat(p);}

    // Trails
    trails.forEach(t=>{const a=t.l/t.ml;ctx.globalAlpha=a*.35;ctx.beginPath();ctx.arc(t.x,t.y,Math.max(0,t.s*a),0,Math.PI*2);ctx.fillStyle=t.c;ctx.fill();ctx.globalAlpha=a*.1;ctx.beginPath();ctx.arc(t.x,t.y,Math.max(0,t.s*a*3),0,Math.PI*2);ctx.fill();});ctx.globalAlpha=1;

    drawParts();drawAfterimages();drawPlayer();

    // Float texts
    fTexts.forEach(t=>{const a=Math.min(1,t.l/(t.ml*.25));ctx.globalAlpha=a;ctx.font=`bold ${17*t.sc}px 'Segoe UI'`;ctx.textAlign='center';ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillText(t.text,t.x+1.5,t.y+1.5);ctx.fillStyle=t.c;ctx.fillText(t.text,t.x,t.y);});ctx.globalAlpha=1;

    ctx.restore();

    // Mist
    for(let i=0;i<4;i++){const my=((frame*.08+i*195)%(CH+100))-50;const mg=ctx.createLinearGradient(0,my,0,my+45);mg.addColorStop(0,'rgba(160,200,235,0)');mg.addColorStop(.5,`rgba(160,200,235,${.02+hr*.01})`);mg.addColorStop(1,'rgba(160,200,235,0)');ctx.fillStyle=mg;ctx.fillRect(WALL_W,my,CW-WALL_W*2,45);}

    // Vignette
    const vg=ctx.createRadialGradient(CW/2,CH/2,CW*.25,CW/2,CH/2,CW*.82);vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(.7,'rgba(0,0,0,0.1)');vg.addColorStop(1,'rgba(0,0,0,0.5)');ctx.fillStyle=vg;ctx.fillRect(0,0,CW,CH);

    // *** RISING FLOOR DANGER ZONE ***
    const ri=Math.min(risingSpeed*4,1);
    if(ri>.01){
        const zh=45+ri*35;
        const dg=ctx.createLinearGradient(0,CH-zh,0,CH);
        dg.addColorStop(0,'rgba(255,40,0,0)');dg.addColorStop(.4,`rgba(255,40,0,${ri*.12})`);dg.addColorStop(1,`rgba(255,40,0,${ri*.4})`);
        ctx.fillStyle=dg;ctx.fillRect(0,CH-zh,CW,zh);
        // Wavy fire line
        ctx.beginPath();for(let x=0;x<=CW;x+=3){const w=Math.sin(x*.04+frame*.08)*4+Math.sin(x*.09+frame*.12)*2.5;if(x===0)ctx.moveTo(x,CH-zh+w);else ctx.lineTo(x,CH-zh+w);}
        ctx.strokeStyle=`rgba(255,80,0,${ri*.5})`;ctx.lineWidth=2;ctx.stroke();
        ctx.strokeStyle=`rgba(255,180,50,${ri*.2})`;ctx.lineWidth=7;ctx.stroke();
        // Fire particles from line
        if(frame%4===0&&ri>.1){particles.push({x:WALL_W+Math.random()*PLAY_W,y:CH-zh+cam.y,vx:(Math.random()-.5)*2,vy:-1-Math.random()*3,l:20+Math.random()*15,ml:35,c:['#ff4400','#ff8800','#ffcc00'][Math.floor(Math.random()*3)],s:2+Math.random()*3,t:'c'});}
    }

    // Player proximity danger
    if(pl.y-cam.y>CH*.6){const d=(pl.y-cam.y-CH*.6)/(CH*.4);ctx.fillStyle=`rgba(255,20,20,${Math.min(d*.3,.3)})`;ctx.fillRect(0,0,CW,CH);}

    // Flip flash
    if(pl.flipping){const fa=Math.sin(pl.flipAngle*3)*.04+.02;ctx.fillStyle=CHARS[selectedChar].flipTrail;ctx.globalAlpha=Math.max(0,fa);ctx.fillRect(0,0,CW,CH);ctx.globalAlpha=1;}
}

function drawMR(peaks,baseY,pO,c1,c2){const g=ctx.createLinearGradient(0,baseY-180+pO,0,baseY+20);g.addColorStop(0,c1);g.addColorStop(1,c2);ctx.fillStyle=g;ctx.beginPath();ctx.moveTo(-10,baseY+30);for(let i=0;i<peaks.length;i++){const py=baseY-peaks[i].h+pO;if(i===0)ctx.lineTo(peaks[i].x,py);else{const prev=peaks[i-1],mx=(prev.x+peaks[i].x)/2;ctx.quadraticCurveTo(mx,baseY-Math.min(prev.h,peaks[i].h)*.25+pO+15,peaks[i].x,py);}}ctx.lineTo(CW+10,baseY+30);ctx.closePath();ctx.fill();}
function drawSF(x,y,r,rot,op,col){ctx.save();ctx.translate(x,y);ctx.rotate(rot);ctx.globalAlpha=op;ctx.strokeStyle=`rgba(${col[0]},${col[1]},${col[2]},0.85)`;ctx.lineWidth=.7;for(let i=0;i<6;i++){const a=i*Math.PI/3;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);ctx.stroke();const bx=Math.cos(a)*r*.55,by=Math.sin(a)*r*.55;ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(bx+Math.cos(a+.55)*r*.28,by+Math.sin(a+.55)*r*.28);ctx.stroke();ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(bx+Math.cos(a-.55)*r*.28,by+Math.sin(a-.55)*r*.28);ctx.stroke();}ctx.restore();ctx.globalAlpha=1;}

function drawWalls(){const startR=Math.floor(cam.y/BRICK_H)-1,endR=startR+Math.ceil(CH/BRICK_H)+2;const wt=getTheme().wallTint;for(let row=startR;row<=endR;row++){const by=row*BRICK_H-cam.y+shake.y;drawBrick(0,by,WALL_W/2,BRICK_H,row,0,false,wt);drawBrick(WALL_W/2,by,WALL_W/2,BRICK_H,row,0,true,wt);drawBrick(CW-WALL_W,by,WALL_W/2,BRICK_H,row,1,false,wt);drawBrick(CW-WALL_W/2,by,WALL_W/2,BRICK_H,row,1,true,wt);}let ls=ctx.createLinearGradient(WALL_W,0,WALL_W+22,0);ls.addColorStop(0,'rgba(0,0,0,0.4)');ls.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=ls;ctx.fillRect(WALL_W,0,22,CH);let rs=ctx.createLinearGradient(CW-WALL_W,0,CW-WALL_W-22,0);rs.addColorStop(0,'rgba(0,0,0,0.4)');rs.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=rs;ctx.fillRect(CW-WALL_W-22,0,22,CH);ctx.globalAlpha=.12;for(let i=0;i<12;i++){const fy=((frame*.12+i*65)%(CH+80))-40,fh=10+Math.sin(i*3.7)*7;ctx.fillStyle='#b8ddf8';ctx.beginPath();ctx.moveTo(WALL_W,fy);ctx.lineTo(WALL_W+5,fy+fh*.35);ctx.lineTo(WALL_W+2,fy+fh*.65);ctx.lineTo(WALL_W+7,fy+fh);ctx.lineTo(WALL_W,fy+fh);ctx.fill();ctx.beginPath();ctx.moveTo(CW-WALL_W,fy+30);ctx.lineTo(CW-WALL_W-5,fy+30+fh*.35);ctx.lineTo(CW-WALL_W-2,fy+30+fh*.65);ctx.lineTo(CW-WALL_W-7,fy+30+fh);ctx.lineTo(CW-WALL_W,fy+30+fh);ctx.fill();}ctx.globalAlpha=1;}

function drawBrick(x,y,w,h,row,side,offset,wt){const zone=Math.floor(Math.abs(row)/25)%5,bases=[[62,48,38],[52,56,66],[48,52,58],[58,42,42],[45,50,60]],bc=bases[zone],v=((row*7+side*13+(offset?19:0))%24)-12;const r=Math.max(0,Math.min(255,bc[0]+v+wt[0])),g=Math.max(0,Math.min(255,bc[1]+v*.7+wt[1])),b=Math.max(0,Math.min(255,bc[2]+v*.5+wt[2])),ox=(row%2===0)?0:(offset?-4:4);ctx.fillStyle=`rgb(${r},${g},${b})`;ctx.fillRect(x+ox+1,y+1,w-2,h-2);ctx.fillStyle='rgba(255,255,255,0.08)';ctx.fillRect(x+ox+1,y+1,w-2,2);ctx.fillStyle='rgba(0,0,0,0.14)';ctx.fillRect(x+ox+1,y+h-3,w-2,2);ctx.fillStyle=`rgb(${Math.max(0,r-28)},${Math.max(0,g-28)},${Math.max(0,b-28)})`;ctx.fillRect(x+ox,y,w,1);ctx.fillRect(x+ox,y+h-1,w,1);const fs=(row*23+side*37+(offset?11:0))%100;if(fs<18){ctx.globalAlpha=.14+fs*.005;ctx.fillStyle='#a8d4f0';ctx.fillRect(x+ox+3+fs%6,y+3,5+fs%7,3+fs%3);ctx.globalAlpha=1;}}

function drawPlat(p){const pal=platColors(p.fl);ctx.fillStyle='rgba(0,0,0,0.25)';rr(ctx,p.x+2,p.y+4,p.w+2,PLAT_H+2,7);ctx.fill();const gr=ctx.createLinearGradient(p.x,p.y,p.x,p.y+PLAT_H);gr.addColorStop(0,`rgb(${pal.h[0]},${pal.h[1]},${pal.h[2]})`);gr.addColorStop(.3,`rgb(${pal.b[0]},${pal.b[1]},${pal.b[2]})`);gr.addColorStop(1,`rgb(${Math.max(0,pal.b[0]-35)},${Math.max(0,pal.b[1]-35)},${Math.max(0,pal.b[2]-35)})`);ctx.fillStyle=gr;ctx.strokeStyle=OL;ctx.lineWidth=OLW*.6;rr(ctx,p.x,p.y,p.w,PLAT_H,6);ctx.fill();ctx.stroke();const sg=ctx.createLinearGradient(p.x,p.y,p.x,p.y+6);sg.addColorStop(0,`rgba(${pal.a[0]},${pal.a[1]},${pal.a[2]},0.6)`);sg.addColorStop(1,'rgba(255,255,255,0)');ctx.fillStyle=sg;rr(ctx,p.x+2,p.y+1,p.w-4,6,4);ctx.fill();ctx.strokeStyle=`rgba(${pal.a[0]},${pal.a[1]},${pal.a[2]},0.2)`;ctx.lineWidth=1;rr(ctx,p.x+.5,p.y+.5,p.w-1,PLAT_H-1,6);ctx.stroke();
// Snow cap
ctx.fillStyle='rgba(225,242,255,0.7)';ctx.beginPath();ctx.moveTo(p.x+3,p.y+2);for(let i=0;i<=p.w-6;i+=3){const sh=2.5+Math.sin(p.fl*1.9+i*.45)*1.2+Math.cos(i*.7+p.fl*.8)*.8;ctx.lineTo(p.x+3+i,p.y-sh);}ctx.lineTo(p.x+p.w-3,p.y+2);ctx.closePath();ctx.fill();ctx.fillStyle='rgba(255,255,255,0.3)';ctx.beginPath();ctx.moveTo(p.x+6,p.y);for(let i=0;i<=p.w-12;i+=5){const sh=1+Math.sin(p.fl*1.9+i*.45)*.5;ctx.lineTo(p.x+6+i,p.y-sh);}ctx.lineTo(p.x+p.w-6,p.y);ctx.closePath();ctx.fill();
// Sparkles

    running=false;playGameOver();shake.i=16;
    const isNew=score>hScore;
    if(isNew){hScore=score;localStorage.setItem('icy_hs',hScore.toString());document.getElementById('highscoreLabel').textContent='! שיא חדש';document.getElementById('highscoreLabel').style.color='#ffdd57';document.getElementById('highscoreLabel').className='highscore-label new-record';}
    else{document.getElementById('highscoreLabel').textContent=`שיא: ${hScore.toLocaleString()}`;document.getElementById('highscoreLabel').style.color='rgba(255,255,255,0.25)';document.getElementById('highscoreLabel').className='highscore-label';}
    document.getElementById('finalScore').textContent=Math.floor(dScore).toLocaleString();
    document.getElementById('finalFloor').textContent=`Floor ${hFloor}`;
    document.getElementById('finalCombo').textContent=`Best Combo: x${maxCombo}`;
    // Auto-save score
    const nameArea=document.getElementById('nameArea');
    const restartBtn=document.getElementById('restartBtn');
    const savedName=localStorage.getItem('icy_name')||'';
    if(savedName){
        saveScore(savedName,score,hFloor);
        nameArea.style.display='none';
        restartBtn.style.display='';
    } else {
        // First time - must enter name before playing again
        nameArea.style.display='block';
        nameArea.querySelector('label').textContent='הכנס שם כדי לשמור תוצאה';
        restartBtn.style.display='none';
        const ni=document.getElementById('playerName');ni.value='';
        setTimeout(()=>ni.focus(),100);
    }
    goScr.style.display='flex';
    setTimeout(()=>renderLB('go-lb-body',score),fbReady?600:50);
}
function startGame(){init();running=true;menuScr.style.display='none';goScr.style.display='none';ea();}

document.getElementById('startBtn').addEventListener('click',startGame);
document.getElementById('restartBtn').addEventListener('click',startGame);
document.getElementById('saveScoreBtn').addEventListener('click',()=>{
    const name=(document.getElementById('playerName').value||'').trim()||'???';
    localStorage.setItem('icy_name',name);
    saveScore(name,score,hFloor);
    document.getElementById('nameArea').style.display='none';
    document.getElementById('restartBtn').style.display='';
    document.getElementById('nameArea').querySelector('label').textContent='!נשמר';
    setTimeout(()=>{renderLB('go-lb-body',score);renderLB('menu-lb-body');},fbReady?600:50);
});
document.getElementById('playerName').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('saveScoreBtn').click();});
window.addEventListener('keydown',e=>{if(e.code==='Space'&&!running){e.preventDefault();startGame();}});

function loop(){update();draw();requestAnimationFrame(loop);}
init();loop();
</script>
